<script>
    const apiURL = 'https://sheetdb.io/api/v1/22nvlss512brg';

    async function initDashboard() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();

            // Log data to console to verify column names match exactly
            console.log("Retrieved Data:", data);

            // Clean data helper: ensures values are numbers even if sheet has units/spaces
            const clean = (val) => {
                if (!val) return 0;
                return parseFloat(val.toString().replace(/[^0-9.]/g, '')) || 0;
            };

            const labels = data.map(item => item.Date || 'N/A');
            
            const createChart = (id, label, color, values) => {
                const canvas = document.getElementById(id);
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: values,
                            borderColor: color,
                            backgroundColor: color + '22',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            };

            // Mapping Data from Sheet - Using exact matches for your column headers
            createChart('nChart', 'Nitrogen', '#2d6a4f', data.map(i => clean(i.Nitrogen)));
            createChart('pChart', 'Phosphorus', '#386641', data.map(i => clean(i.Phosphorus)));
            createChart('kChart', 'Potassium', '#6a994e', data.map(i => clean(i.Potassium)));
            createChart('tempChart', 'Temp', '#bc4749', data.map(i => clean(i.Temperature)));
            createChart('moistureChart', 'Moisture', '#0077b6', data.map(i => clean(i["Soil Moisture"])));
            createChart('gasChart', 'CO2', '#e67e22', data.map(i => clean(i["Gas (CO2)"])));

        } catch (err) {
            console.error("Dashboard loading error:", err);
        }
    }

    initDashboard();
</script>
